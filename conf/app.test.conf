appname = myGymPal
httpaddr = localhost
httpport = 8080
runmode = dev

# Sessions
sessionon = true
sessionname = mygympal_session
sessiongcmaxlifetime = 86400

# PostgreSQL connection
db_driver = postgres
db_host = localhost
db_port = 5432
db_name = mygympal_test
db_user = postgres
db_password = postgres
db_sslmode = disable
